<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishan CMS - Admin Dashboard</title>
    <!-- Use Tailwind CSS for rapid simple styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex flex-col hidden sm:flex">
            <div class="h-16 flex items-center px-6 border-b border-slate-800 font-bold text-xl tracking-wider text-amber-500">
                ISHAN CMS
            </div>
            <nav class="flex-1 py-4">
                <a href="#" class="flex px-6 py-3 bg-slate-800 text-amber-500 border-l-4 border-amber-500">
                    Contacts Management
                </a>
            </nav>
            <div class="p-6 text-sm text-slate-400">
                &copy; 2026 Admin Panel
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50">
            <header class="bg-white shadow-sm h-16 flex items-center justify-between px-8">
                <h1 class="text-2xl font-semibold text-gray-800">Content Management</h1>
                <div class="text-gray-500">Admin Mode</div>
            </header>

            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-medium text-gray-700">Manage Contacts</h2>
                    <button onclick="openModal()" class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-md shadow transition">
                        + Add New Contact
                    </button>
                </div>

                <!-- Contacts Table -->
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">College Name</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Contact Info</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Order</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="contactsTableBody" class="bg-white divide-y divide-gray-200">
                            <!-- Contacts will be rendered here dynamically -->
                        </tbody>
                    </table>
                    <div id="loading" class="text-center py-8 text-gray-500">Loading contacts...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for Create/Edit -->
    <div id="contactModal" class="fixed inset-0 z-50 bg-black bg-opacity-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-lg overflow-hidden">
            <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                <h3 id="modalTitle" class="text-lg font-medium text-gray-900">Edit Contact</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-500">&times;</button>
            </div>
            <div class="p-6">
                <form id="contactForm" onsubmit="saveContact(event)">
                    <input type="hidden" id="contactId" />
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">College/Campus Name</label>
                            <input type="text" id="college" required class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-amber-500" />
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                                <input type="text" id="phone" required class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-amber-500" />
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp</label>
                                <input type="text" id="whatsapp" required class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-amber-500" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" id="email" required class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-amber-500" />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Order Index (Display Order)</label>
                            <input type="number" id="orderIndex" value="0" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-amber-500" />
                        </div>
                    </div>
                    <div class="mt-6 flex justify-end gap-3">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 focus:outline-none">Cancel</button>
                        <button type="submit" class="px-4 py-2 bg-amber-600 text-white rounded-md hover:bg-amber-700 focus:outline-none">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/admin.js"></script>
</body>
</html>
